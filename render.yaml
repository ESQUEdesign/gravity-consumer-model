services:
  - type: web
    name: gravity-consumer-model
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.maxUploadSize 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
